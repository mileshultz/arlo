<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found | arloshultz.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #38bdf8;
    }

    h2 {
      margin: 10px 0;
      font-size: 1.8rem;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: white;
      background: #38bdf8;
      padding: 12px 20px;
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #0284c7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>The page you're looking for doesn’t exist or has been moved.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
